<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manga → PDF</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main class="wrap">
    <header>
      <h1>Manga&nbsp;→&nbsp;PDF</h1>
      <p class="sub">Paste a MangaDex or Dynasty Scans title URL, pick chapters, download as PDF.</p>
    </header>

    <form id="search-form" class="search">
      <input
        id="url"
        type="text"
        placeholder="https://mangadex.org/title/…  or  https://dynasty-scans.com/series/…"
        autocomplete="off"
        required
      />
      <select id="lang" title="Translated language">
        <option value="en">English</option>
        <option value="es">Español</option>
        <option value="es-la">Español (LATAM)</option>
        <option value="fr">Français</option>
        <option value="de">Deutsch</option>
        <option value="pt-br">Português (BR)</option>
        <option value="ru">Русский</option>
        <option value="ja">日本語</option>
      </select>
      <button type="submit" id="load-btn">Load</button>
    </form>

    <div id="alert" class="alert hidden" role="alert"></div>

    <section id="manga" class="hidden">
      <div class="manga-head">
        <h2 id="manga-title"></h2>
        <span id="manga-meta" class="meta"></span>
      </div>

      <div class="toolbar">
        <label class="quality">
          Quality:
          <select id="quality">
            <option value="datasaver">Data-saver (smaller)</option>
            <option value="original">Original (larger)</option>
          </select>
        </label>
        <label class="quality zip-opt" title="Bundle every selected chapter into a single .zip of PDFs">
          <input type="checkbox" id="zip" />
          Zip together
        </label>
        <div class="spacer"></div>
        <button id="select-all" class="ghost" type="button">Select all</button>
        <button id="clear-all" class="ghost" type="button">Clear</button>
        <button id="download-btn" type="button">Download selected</button>
      </div>

      <ul id="chapters" class="chapters"></ul>
    </section>
  </main>

  <footer class="foot">
    For personal use. Please support official releases and scanlation groups.
  </footer>

  <script src="/app.js"></script>
</body>
</html>
